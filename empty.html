<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" type="text/css" href="styles/main.css">
<style>
a, a:hover, a:focus, a:active {
    text-decoration: none;
    color: inherit;
}

.icons {
    display: inline-block;
    text-align: center;
    margin: 5px;
}
.icon {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Calibri', sans-serif;
    color: white;
    text-align: center;
}
.icon-img {
    width: 80px;
    image-rendering: pixelated;
}
.icon-img-hidden {
    position: fixed;
    width: 80px;
    image-rendering: pixelated;
    opacity: 0;
}
.icon:active > .icon-img-hidden {
    opacity: 1;
}
.icon:active > .icon-txt {
    background-color: #0000a8;
    outline: dotted white;
}
</style>
<script type="text/javascript" src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
<script type="text/javascript" src="scripts/clock.js"></script>
</head>
<body>

<div class="icons">
<a href="index.html"><div class="icon"><img class="icon-img" src="images/bosniper.png"><img class="icon-img-hidden" src="images/bosniper-select.png"><div class="icon-txt">Bolun Thompson</div></div></a><br>
<a href="credits.html"><div class="icon" style="margin-top: 10px"><img class="icon-img" src="images/scroll.png"><img class="icon-img-hidden" src="images/scroll-select.png"><div class="icon-txt">credits.txt</div></div></a>
</div>

<div class="footer">
<div style="flex-grow:1"></div>
<div class="footer-time" style="width:70px"><label id="lblTime"></label></div>
</div>

</body>
</html>
